# اختبارات: H2 في الذاكرة فقط (بدون profile h2file من الإنتاج)
spring.application.name=ecommerce
spring.datasource.url=jdbc:h2:mem:ecommerce_test;DB_CLOSE_DELAY=-1;MODE=Oracle;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

app.jwt.secret=TestJwtSecretMustBeAtLeast32BytesLong123456
app.jwt.expiration-ms=86400000
app.home.chosen-title-ar=اختبرنا لك
app.home.chosen-title-en=Chosen for you
app.home.chosen-cta-ar=استكشف
app.home.chosen-cta-en=Explore
app.home.chosen-cta-href=/collections/chosen-for-you

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
