# H2 على ملف: البيانات تفضل تحت مجلد ./data/ بجانب تشغيل التطبيق (أو غيّر المسار بـ app.h2.file)
spring.datasource.url=jdbc:h2:file:${app.h2.file:./data/ecommerce};MODE=Oracle;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
