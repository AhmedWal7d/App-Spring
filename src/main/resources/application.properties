spring.application.name=ecommerce

# Render / Railway / Fly.io … تضع متغير PORT
server.port=${PORT:8080}

# قاعدة البيانات: h2file = H2 على ملف (البيانات في ./data/). للرجوع لـ Oracle: spring.profiles.active=oracle
spring.profiles.active=h2file

# UTF-8 for HTTP request/response bodies (fixes garbled Arabic/JSON in some clients)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
# --- Oracle (يُفعّل مع profile: oracle — انظر application-oracle.properties) ---
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# مسار ملف H2 (بدون امتداد .mv.db) — يُستخدم مع profile h2file
# محليًا: app.h2.file=./data/ecommerce
# على Render مع Persistent Disk مثلاً: APP_H2_FILE=/data/ecommerce

# للإنتاج: عيّن APP_JWT_SECRET (أو نفس القيمة في IDE محليًا)
app.jwt.secret=${APP_JWT_SECRET:ChangeThisToAtLeast32BytesLongSecretKey123456}
app.jwt.expiration-ms=86400000

# Bootstrap ROLE_ADMIN (created on startup only if this email does not exist yet). Leave blank to skip.
app.admin.email=admin@ecommerce.local
app.admin.password=${APP_ADMIN_PASSWORD:ChangeMe123!}

# «Chosen for you» section titles (used inside GET /api/web/home)
app.home.chosen-title-ar=اخترنا لك
app.home.chosen-title-en=Chosen for you
app.home.chosen-cta-ar=استكشف اخترنا لك
app.home.chosen-cta-en=Explore chosen for you
app.home.chosen-cta-href=/collections/chosen-for-you

# OTP is sent by email only (never returned in the JSON body). Must be a registered account.
app.otp.ttl-minutes=10
spring.mail.from=${SPRING_MAIL_FROM:}
# --- Email (host + port are required or JavaMailSender is not created) ---
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000
spring.mail.default-encoding=UTF-8
 # تفعيل كل الـ endpoints
management.endpoints.web.exposure.include=*

# تفعيل prometheus endpoint
management.endpoint.prometheus.enabled=true

# مهم علشان يظهر metrics
management.metrics.export.prometheus.enabled=true
 
# مفاتيح Stripe من لوحة Stripe أو من متغيرات البيئة (لا تضع المفاتيح الحقيقية في Git)
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
app.checkout.base-url=${APP_CHECKOUT_BASE_URL:http://localhost:8080}
