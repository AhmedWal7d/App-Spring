name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build and test
        run: mvn -B -ntp verify

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecommerce-jar
          path: target/*.jar
          if-no-files-found: error

      # Docker Hub (على push فقط):
      # Variables → DOCKER_USERNAME: https://github.com/AhmedWal7d/App-Spring/settings/variables/actions
      # Secrets → DOCKER_PASSWORD (لازم من تبويب Secrets مش Variables):
      #   https://github.com/AhmedWal7d/App-Spring/settings/secrets/actions
      # القيمة = Personal Access Token من hub.docker.com/settings/security
      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        run: |
          docker build -t ${{ vars.DOCKER_USERNAME }}/ecommerce:${{ github.sha }} -t ${{ vars.DOCKER_USERNAME }}/ecommerce:latest .
          docker push ${{ vars.DOCKER_USERNAME }}/ecommerce:${{ github.sha }}
          docker push ${{ vars.DOCKER_USERNAME }}/ecommerce:latest
