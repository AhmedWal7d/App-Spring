name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build and test
        run: mvn -B -ntp verify

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecommerce-jar
          path: target/*.jar
          if-no-files-found: error

      # Docker Hub (على push فقط):
      # Variable: DOCKER_USERNAME | Secret: DOCKER_PASSWORD (= PAT من hub.docker.com/settings/security)
      # لازم Secret من تبويب Secrets (مش Variables)
      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        env:
          DOCKER_USER: ${{ vars.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_PASS_ALT: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -e
          PASS="$DOCKER_PASS"
          if [ -z "$PASS" ]; then PASS="$DOCKER_PASS_ALT"; fi
          if [ -z "$DOCKER_USER" ]; then
            echo "::error::Variable DOCKER_USERNAME is empty. Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi
          if [ -z "$PASS" ]; then
            echo "::error::No Docker Hub token. Add a Repository secret named exactly: DOCKER_PASSWORD"
            echo "::error::Value = Personal Access Token from https://hub.docker.com/settings/security (NOT the Variables tab)."
            echo "::error::Secrets page: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "$PASS" | docker login docker.io -u "$DOCKER_USER" --password-stdin

      - name: Build and push Docker image
        if: github.event_name == 'push'
        run: |
          docker build -t ${{ vars.DOCKER_USERNAME }}/ecommerce:${{ github.sha }} -t ${{ vars.DOCKER_USERNAME }}/ecommerce:latest .
          docker push ${{ vars.DOCKER_USERNAME }}/ecommerce:${{ github.sha }}
          docker push ${{ vars.DOCKER_USERNAME }}/ecommerce:latest
